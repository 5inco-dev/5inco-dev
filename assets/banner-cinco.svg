<svg width="1600" height="420" viewBox="0 0 1600 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cinco engineering banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#15181C"/>
      <stop offset="1" stop-color="#0F1216"/>
    </linearGradient>
    <linearGradient id="lineFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#98A2B30A"/>
      <stop offset="0.5" stop-color="#98A2B333"/>
      <stop offset="1" stop-color="#98A2B30A"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .brand {
        font-family: "Orbitron", "Eurostile", "Segoe UI", Arial, sans-serif;
        font-size: 124px;
        font-weight: 800;
        letter-spacing: 0.2em;
        fill: #F3F4F6;
      }
      .tag {
        font-family: "Inter", "Segoe UI", Arial, sans-serif;
        font-size: 43px;
        font-weight: 500;
        letter-spacing: 0.03em;
        fill: #C9CED6;
      }
      .subtle {
        stroke: url(#lineFade);
        stroke-width: 1;
      }
      .node {
        fill: #98A2B31A;
        stroke: #98A2B366;
        stroke-width: 1;
      }
    </style>
  </defs>

  <rect width="1600" height="420" fill="url(#bg)"/>

  <!-- Subtle architecture lines -->
  <g opacity="0.85">
    <path class="subtle" d="M80 90H420L500 150H760"/>
    <path class="subtle" d="M60 150H360L430 210H840"/>
    <path class="subtle" d="M120 220H420L510 285H900"/>
    <path class="subtle" d="M90 300H380L455 345H740"/>

    <path class="subtle" d="M900 80H1160L1220 120H1480"/>
    <path class="subtle" d="M860 165H1130L1210 210H1540"/>
    <path class="subtle" d="M820 250H1080L1160 300H1490"/>

    <path class="subtle" d="M560 65V345"/>
    <path class="subtle" d="M1030 70V335"/>
  </g>

  <!-- Minimal nodes -->
  <g filter="url(#softGlow)">
    <circle class="node" cx="420" cy="90" r="5"/>
    <circle class="node" cx="500" cy="150" r="5"/>
    <circle class="node" cx="430" cy="210" r="5"/>
    <circle class="node" cx="510" cy="285" r="5"/>
    <circle class="node" cx="455" cy="345" r="5"/>

    <circle class="node" cx="1160" cy="80" r="5"/>
    <circle class="node" cx="1220" cy="120" r="5"/>
    <circle class="node" cx="1210" cy="210" r="5"/>
    <circle class="node" cx="1160" cy="300" r="5"/>
  </g>

  <!-- Text content -->
  <text class="brand" x="108" y="240">CINCO</text>
  <text class="tag" x="865" y="238">Backend | Systems | Security</text>
</svg>
